# Agus OSINT Backend — Fly.io Configuration
# Deploy: cd backend && fly deploy
#
# First time:
#   fly apps create agus-backend
#   fly secrets set ACLED_EMAIL=... ACLED_PASSWORD=... (optional)
#   fly deploy

app = "agus-backend"
primary_region = "iad"

[build]

[env]
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "2048mb"
  cpu_kind = "shared"
  cpus = 1
