# Agus OSINT Backend — Fly.io Configuration
# Deploy: cd backend && fly deploy
#
# First time:
#   fly apps create agus-backend
#   fly secrets set ACLED_EMAIL=... ACLED_PASSWORD=... (optional)
#   fly deploy

app = "agus-backend"
primary_region = "iad"

[build]

[env]
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "180s"
    method = "GET"
    path = "/api/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
